<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7f1d1d">
    <title>Projeto ADS - Quiz</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans selection:bg-red-900 selection:text-white">

    <header class="w-full p-4 border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-sm fixed top-0 z-10 flex flex-col items-center justify-center shadow-md">
        <span class="text-[10px] text-zinc-500 uppercase tracking-widest font-semibold">FATEC - Análise e Desenvolvimento de Sistemas</span>
        <h1 class="text-lg font-bold text-zinc-200 mt-1">Projeto de Férias <span class="text-red-700">|</span> Frontend</h1>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto mt-20 p-5 flex flex-col">
        
        <div class="bg-zinc-900 border border-red-900/40 rounded-2xl p-6 shadow-2xl relative overflow-hidden flex-1 flex flex-col">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-zinc-900 via-red-800 to-zinc-900"></div>

            <div class="flex justify-between items-center mb-6">
                <span class="text-xs font-medium text-zinc-400 bg-zinc-800 px-3 py-1 rounded-full">Tema: Supernatural</span>
                <span class="text-xs font-bold text-red-500">1 / 3</span>
            </div>

            <h2 class="text-xl font-semibold leading-snug mb-8 text-center text-zinc-100">
                Qual é o modelo e o ano do carro icônico dos irmãos Winchester?
            </h2>

            <div class="flex flex-col gap-3 mt-auto mb-4">
                <button class="w-full text-left p-4 rounded-xl bg-zinc-800/50 border border-zinc-700 active:bg-zinc-700 active:border-red-600 transition-colors flex items-center group">
                    <span class="w-8 h-8 flex-shrink-0 rounded-full bg-zinc-900 border border-zinc-600 flex items-center justify-center mr-3 text-sm font-bold text-zinc-400 group-active:text-red-500 group-active:border-red-500">A</span>
                    <span class="text-sm font-medium">Ford Mustang 1969</span>
                </button>

                <button class="w-full text-left p-4 rounded-xl bg-zinc-800/50 border border-zinc-700 active:bg-zinc-700 active:border-red-600 transition-colors flex items-center group">
                    <span class="w-8 h-8 flex-shrink-0 rounded-full bg-zinc-900 border border-zinc-600 flex items-center justify-center mr-3 text-sm font-bold text-zinc-400 group-active:text-red-500 group-active:border-red-500">B</span>
                    <span class="text-sm font-medium">Chevrolet Impala 1967</span>
                </button>

                <button class="w-full text-left p-4 rounded-xl bg-zinc-800/50 border border-zinc-700 active:bg-zinc-700 active:border-red-600 transition-colors flex items-center group">
                    <span class="w-8 h-8 flex-shrink-0 rounded-full bg-zinc-900 border border-zinc-600 flex items-center justify-center mr-3 text-sm font-bold text-zinc-400 group-active:text-red-500 group-active:border-red-500">C</span>
                    <span class="text-sm font-medium">Dodge Charger 1970</span>
                </button>

                <button class="w-full text-left p-4 rounded-xl bg-zinc-800/50 border border-zinc-700 active:bg-zinc-700 active:border-red-600 transition-colors flex items-center group">
                    <span class="w-8 h-8 flex-shrink-0 rounded-full bg-zinc-900 border border-zinc-600 flex items-center justify-center mr-3 text-sm font-bold text-zinc-400 group-active:text-red-500 group-active:border-red-500">D</span>
                    <span class="text-sm font-medium">Pontiac GTO 1965</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado com sucesso:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Falha ao registrar o ServiceWorker:', error);
                    });
            });
        }
    </script>
</body>
</html>
